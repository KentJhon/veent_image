#
# EventSnap — Full Stack Docker Compose
# Extends Immich with the SvelteKit app and a separate app database.
#

name: eventsnap

services:
  # ── Immich Services (photo management + ML engine) ──

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION:?}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'   # Internal only in production — remove this and use reverse proxy
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    ports:
      - '3003:3003'
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    ports:
      - '5435:5432'
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:?}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

  # ── EventSnap SvelteKit App ────────────────────────

  sveltekit-app:
    container_name: eventsnap_app
    build: ./sveltekit-app
    ports:
      - '3000:3000'
    environment:
      APP_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD:?}@app-database:5432/app
      AUTH_SECRET: ${AUTH_SECRET:?}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      IMMICH_API_URL: http://immich-server:2283/api
      IMMICH_API_KEY: ${IMMICH_ADMIN_API_KEY:?}
      IMMICH_ML_URL: http://immich-machine-learning:3003
      IMMICH_DB_URL: postgresql://${IMMICH_RO_USER:-sveltekit_ro}:${IMMICH_RO_PASS:?}@database:5432/${DB_DATABASE_NAME:-immich}
      AUTH_TRUST_HOST: 'true'
      ORIGIN: http://localhost:3000
      IMMICH_SERVICE_USER_ID: ${IMMICH_SERVICE_USER_ID:?}
      S3_URL: ${S3_URL:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-auto}
    volumes:
      - ${UPLOAD_LOCATION:?}:/immich-data:ro
    depends_on:
      - immich-server
      - immich-machine-learning
      - app-database
    restart: always

  # ── MinIO (S3-compatible object storage) ───────────

  minio:
    container_name: eventsnap_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web console
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    restart: always
    healthcheck:
      test: mc ready local || exit 1
      interval: 10s
      timeout: 5s

  # ── App Database (separate from Immich) ────────────

  app-database:
    container_name: eventsnap_postgres
    image: postgres:16
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:?}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: pg_isready -U app -d app
      interval: 10s
      timeout: 5s

volumes:
  model-cache:
  app-db-data:
  minio-data:
